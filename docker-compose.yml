# ====================================================
# MedGraphRAG — Full-Stack Docker Compose
# ====================================================
# Usage:
#   docker compose up --build
#
# Services:
#   frontend    → React UI         (port 3001)
#   backend     → FastAPI           (port 5000)
#   graphrag    → TigerGraph RAG    (port 8000)
#   graphrag-ecc→ ECC Service       (port 8001)
#   chat-history→ Chat Persistence  (port 8002)
#   nginx       → Reverse Proxy     (port 80)
# ====================================================

services:
  # ── React Frontend ──
  frontend:
    container_name: medgraphrag-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend
      - graphrag
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_BACKEND_URL=http://localhost:5000
      - VITE_RAG_URL=http://localhost:8080

  # ── FastAPI Backend ──
  backend:
    container_name: medgraphrag-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - graphrag
    env_file:
      - ./backend/.env
    volumes:
      - ./evaluation:/app/evaluation
      - backend_data:/app/data
    restart: unless-stopped

  # ── GraphRAG Main Service ──
  graphrag:
    image: tigergraph/graphrag:latest
    platform: linux/amd64
    container_name: graphrag
    build:
      context: ./graphrag
      dockerfile: graphrag/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - graphrag-ecc
      - chat-history
    environment:
      SERVER_CONFIG: "/code/configs/server_config.json"
      LOGLEVEL: "INFO"
      USE_CYPHER: "true"
      INIT_EMBED_STORE: "false"
    volumes:
      - ./graphrag/configs/:/code/configs
      - ./graphrag/common/config.py:/code/common/config.py
    restart: unless-stopped

  # ── GraphRAG ECC Service ──
  graphrag-ecc:
    image: tigergraph/graphrag-ecc:latest
    platform: linux/amd64
    container_name: graphrag-ecc
    build:
      context: ./graphrag
      dockerfile: ecc/Dockerfile
    ports:
      - "8001:8001"
    environment:
      SERVER_CONFIG: "/code/configs/server_config.json"
      LOGLEVEL: "INFO"
      INIT_EMBED_STORE: "false"
    volumes:
      - ./graphrag/configs/:/code/configs
    restart: unless-stopped

  # ── Chat History Service ──
  chat-history:
    image: tigergraph/chat-history:latest
    platform: linux/amd64
    container_name: chat-history
    build:
      context: ./graphrag/chat-history/
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      CONFIG_FILES: "/configs/server_config.json"
      LOGLEVEL: "INFO"
    volumes:
      - ./graphrag/configs/:/configs
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──
  nginx:
    container_name: medgraphrag-nginx
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
      - graphrag
    restart: unless-stopped

volumes:
  backend_data:
